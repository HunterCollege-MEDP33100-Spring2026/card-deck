<!doctype html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>The Little Prince Card Deck</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink:wght@100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <header>
        <h1>The Little Prince Card Deck</h1>
        <p>Click on each card to reveal more information.</p>
    </header>

    <main>
        <!-- main is the main content area of the page -->

        <div class="deck"></div>
        <!-- this empty div is where JavaScript will place all the cards -->
        <!-- script.js looks for .deck and inserts the card elements here -->
    </main>

    <script src="script.js"></script>
    <!-- connects the JavaScript file to the page -->
    <!-- this script will fetch the JSON and create the cards -->
</body>

</html>
